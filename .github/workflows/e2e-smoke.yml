name: E2E Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-smoke:
    name: E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Make runner executable
        run: chmod +x ./scripts/ci/run-e2e-smoke.sh
      - name: Run e2e smoke
        run: ./scripts/ci/run-e2e-smoke.sh
